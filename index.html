<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS2 Wingman | Combat Report</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --ct:#4fc3f7; --t:#ffb74d;
    --win:#69f0ae; --loss:#ff5252; --tie:#aaa;
    --bg:#0a0c10; --panel:#0d1117; --panel2:#0f141c;
    --border:#1e2a3a; --accent:#00e5ff;
    --gold:#ffd700; --silver:#c0c0c0; --bronze:#cd7f32;
    --orh:#b39ddb; --kab:#ffab40; --mrfp:#4db6ac; --so:#f48fb1;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:#e0e0e0;font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:1000;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);}

  .site-header{text-align:center;padding:44px 20px 28px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0d1b2a,transparent);position:relative;}
  .site-header::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:180px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
  .eyebrow{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:4px;color:var(--accent);opacity:.6;text-transform:uppercase;margin-bottom:10px;}
  h1{font-family:'Orbitron',sans-serif;font-size:clamp(26px,5vw,52px);font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#fff,var(--accent) 50%,#4fc3f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:6px;}
  .header-sub{font-family:'Share Tech Mono',monospace;font-size:12px;color:#445;letter-spacing:2px;}

  .scope-bar{display:flex;justify-content:center;gap:8px;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--panel2);}
  .scope-btn{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;padding:8px 20px;border-radius:3px;cursor:pointer;border:1px solid var(--border);background:transparent;color:#445;text-transform:uppercase;transition:all .15s;}
  .scope-btn.active{background:var(--accent);color:#000;border-color:var(--accent);}
  .scope-btn:hover:not(.active){border-color:#334;color:#889;}

  .session-sel-wrap{background:var(--panel2);border-bottom:1px solid var(--border);padding:10px 20px;overflow-x:auto;}
  .session-chips{display:flex;gap:8px;min-width:max-content;}
  .s-chip{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;padding:7px 14px;border-radius:3px;cursor:pointer;border:1px solid var(--border);background:transparent;color:#445;text-transform:uppercase;transition:all .15s;white-space:nowrap;}
  .s-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,.07);}
  .s-chip:hover:not(.active){border-color:#334;color:#778;}
  .s-chip .chip-sub{display:block;font-size:7px;color:#334;letter-spacing:1px;margin-top:2px;font-family:'Share Tech Mono',monospace;}
  .s-chip.active .chip-sub{color:rgba(0,229,255,.4);}

  .container{max-width:1100px;margin:0 auto;padding:36px 20px;}

  .sec-title{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:4px;color:var(--accent);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
  .sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
  .sec-sub{font-size:9px;color:#334;font-family:'Share Tech Mono',monospace;letter-spacing:1px;}

  .sum-bar{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:38px;flex-wrap:wrap;}
  .sum-cell{flex:1;min-width:90px;padding:14px 10px;text-align:center;border-right:1px solid var(--border);background:var(--panel);}
  .sum-cell:last-child{border-right:none;}
  .sum-val{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;line-height:1;}
  .sum-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:#334;text-transform:uppercase;margin-top:5px;}

  .col-hdr{display:grid;grid-template-columns:34px 1fr repeat(6,70px);gap:4px;padding:5px 14px;}
  .col-hdr span{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:#223;text-transform:uppercase;text-align:center;cursor:pointer;padding:4px 2px;border-radius:3px;transition:color .15s,background .15s;user-select:none;}
  .col-hdr span:nth-child(2){text-align:left;}
  .col-hdr span:hover{color:#667;background:rgba(255,255,255,.03);}
  .col-hdr span.sort-active{color:var(--accent);}
  .col-hdr span.sort-active .arr{opacity:1;}
  .arr{opacity:0;transition:opacity .15s;margin-left:2px;}
  .lb-row{display:grid;grid-template-columns:34px 1fr repeat(6,70px);gap:4px;align-items:center;padding:12px 14px;background:var(--panel);border:1px solid var(--border);border-left:3px solid transparent;border-radius:4px;margin-bottom:5px;transition:transform .15s;}
  .lb-row:hover{transform:translateX(2px);}
  .lb-row.r1{border-left-color:var(--gold);background:linear-gradient(90deg,rgba(255,215,0,.05),var(--panel) 40%);}
  .lb-row.r2{border-left-color:var(--silver);background:linear-gradient(90deg,rgba(192,192,192,.04),var(--panel) 40%);}
  .lb-row.r3{border-left-color:var(--bronze);background:linear-gradient(90deg,rgba(205,127,50,.04),var(--panel) 40%);}
  .lb-row.r4{border-left-color:#223;}
  .rn{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;text-align:center;}
  .r1 .rn{color:var(--gold);}.r2 .rn{color:var(--silver);}.r3 .rn{color:var(--bronze);}.r4 .rn{color:#2a3a4a;}
  .pname{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;margin-bottom:2px;}
  .ptitle{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;color:#2a3a4a;text-transform:uppercase;}
  .sc{text-align:center;}
  .sv{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;line-height:1;}
  .sl{font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:1px;color:#2a3a4a;text-transform:uppercase;margin-top:2px;}
  .mb{width:44px;height:3px;background:#0a0d14;border-radius:2px;margin:3px auto 0;overflow:hidden;}
  .mf{height:100%;border-radius:2px;}

  .bar-row{display:grid;grid-template-columns:130px 1fr 48px;align-items:center;gap:12px;margin-bottom:12px;}
  .bar-row:last-child{margin-bottom:0;}
  .blbl{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:600;text-align:right;color:#778;}
  .btrk{height:16px;background:#0a0d14;border-radius:3px;overflow:hidden;}
  .bfll{height:100%;border-radius:3px;}
  .bnum{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:var(--accent);text-align:right;}

  .tl-wrap{margin-bottom:38px;}
  .sess-hdr{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .sess-pill{background:var(--accent);color:#000;font-family:'Orbitron',sans-serif;font-size:9px;font-weight:900;letter-spacing:2px;padding:5px 12px;border-radius:3px;white-space:nowrap;}
  .sess-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(0,229,255,.3),transparent);}
  .sess-meta{font-family:'Share Tech Mono',monospace;font-size:9px;color:#2a3a4a;letter-spacing:1px;white-space:nowrap;}
  .match-row{display:grid;grid-template-columns:46px 1fr;}
  .tl-gut{display:flex;flex-direction:column;align-items:center;}
  .tl-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--bg);flex-shrink:0;margin-top:15px;}
  .tl-dot.win{background:var(--win);box-shadow:0 0 6px var(--win);}
  .tl-dot.tie{background:#2a3a4a;}
  .tl-ln{width:1px;flex:1;background:var(--border);margin-top:3px;}
  .mc{background:var(--panel);border:1px solid var(--border);border-radius:4px;margin-bottom:7px;overflow:hidden;}
  .mc.win{border-left:3px solid var(--win);}
  .mc.tie{border-left:3px solid #2a3a4a;}
  .mch{display:grid;grid-template-columns:1fr auto auto auto;align-items:center;gap:10px;padding:9px 13px;cursor:pointer;user-select:none;}
  .mch:hover{background:rgba(255,255,255,.015);}
  .mcmap{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:#ccd;}
  .mcnum{font-family:'Share Tech Mono',monospace;font-size:9px;color:#2a3a4a;}
  .mcscore{font-family:'Share Tech Mono',monospace;font-size:11px;color:#556;}
  .mcbadge{font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;letter-spacing:1.5px;padding:3px 8px;border-radius:2px;}
  .bw{color:var(--win);background:rgba(105,240,174,.08);border:1px solid rgba(105,240,174,.2);}
  .bt{color:#888;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);}
  .mcchev{font-size:9px;color:#2a3a4a;transition:transform .2s;}
  .mch.open .mcchev{transform:rotate(180deg);}
  .mcbody{display:none;border-top:1px solid var(--border);}
  .mcbody.open{display:grid;grid-template-columns:1fr 1fr;}
  .mcteam{padding:9px 13px;}
  .mcteam:first-child{border-right:1px solid var(--border);}
  .tlbl{font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
  .tlbl.ct{color:var(--ct);}.tlbl.t{color:var(--t);}
  .tplayer{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .tpname{font-family:'Orbitron',sans-serif;font-size:9px;color:#ccd;}
  .tpstats{font-family:'Share Tech Mono',monospace;font-size:9px;color:#445;}

  .adr-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:9px;margin-bottom:14px;}
  .adr-card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:16px;text-align:center;}
  .adr-cname{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:#334;text-transform:uppercase;margin-bottom:6px;}
  .adr-cval{font-family:'Orbitron',sans-serif;font-size:30px;font-weight:900;line-height:1;}
  .adr-csub{font-family:'Share Tech Mono',monospace;font-size:8px;color:#2a3a4a;margin-top:4px;}
  .adr-bw{height:3px;background:#0a0d14;border-radius:2px;margin-top:7px;overflow:hidden;}
  .adr-bf{height:100%;border-radius:2px;}

  .adr-tbl-wrap{background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:12px;}
  .adr-thdr{padding:10px 16px;border-bottom:1px solid var(--border);font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;}
  table.atbl{width:100%;border-collapse:collapse;font-family:'Share Tech Mono',monospace;font-size:11px;}
  table.atbl th{padding:7px 12px;text-align:center;color:#1e2a3a;font-size:8px;letter-spacing:2px;font-weight:400;text-transform:uppercase;border-bottom:1px solid var(--border);}
  table.atbl th:first-child{text-align:left;}
  table.atbl td{padding:8px 12px;text-align:center;border-bottom:1px solid #0a0d14;}
  table.atbl td:first-child{text-align:left;font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;color:#889;}
  table.atbl tfoot td{border-top:2px solid var(--border);border-bottom:none;background:#080b10;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;}
  table.atbl tfoot td:first-child{font-size:8px;letter-spacing:2px;color:#334;font-weight:400;}

  .adr-chart-wrap{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:20px;margin-bottom:38px;}
  .act{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:14px;}

  .ins-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:9px;margin-bottom:38px;}
  .ins-card{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:13px 16px;}
  .ins-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:#2a3a4a;text-transform:uppercase;margin-bottom:6px;}
  .ins-val{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;line-height:1;margin-bottom:4px;}
  .ins-desc{font-family:'Share Tech Mono',monospace;font-size:9px;color:#445;}

  .stat-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:9px;margin-bottom:38px;}
  .stat-card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:16px;position:relative;overflow:hidden;}
  .stat-card::after{content:'';position:absolute;top:0;right:0;width:50px;height:50px;background:radial-gradient(circle at top right,rgba(0,229,255,.05),transparent 70%);}
  .sci{font-size:20px;margin-bottom:9px;display:block;}
  .scv{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;color:var(--accent);line-height:1;margin-bottom:3px;}
  .scd{font-family:'Share Tech Mono',monospace;font-size:10px;color:#445;}
  .scp{font-family:'Orbitron',sans-serif;font-size:9px;color:#778;margin-top:6px;font-weight:600;}

  .future-pill{border:1px dashed #1a2535;border-radius:6px;padding:16px;text-align:center;margin-top:10px;}
  .future-pill p{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:#1e2a3a;text-transform:uppercase;}

  .site-footer{text-align:center;padding:26px 20px;border-top:1px solid var(--border);font-family:'Share Tech Mono',monospace;font-size:9px;color:#1e2a3a;letter-spacing:2px;}

  @media(max-width:680px){
    .lb-row,.col-hdr{grid-template-columns:30px 1fr repeat(3,58px);}
    .lb-row .sc:nth-child(n+7),.col-hdr span:nth-child(n+7){display:none;}
    .mcbody.open{grid-template-columns:1fr;}
    .mcteam:first-child{border-right:none;border-bottom:1px solid var(--border);}
  }
</style>
</head>

  },
  // {
  //   id:'s2', date:'Apr 20, 2025', label:'APR 20',
  //   matches:[ ... ]
  // },
];

// ─── STATE ───────────────────────────────────
let scope = 'all';
let activeSess = SESSIONS[SESSIONS.length-1].id; // auto-points to latest
let lbSortKey = 'score';
let lbSortDir = 1;
let currentPs = [];

// ─── UTILS ───────────────────────────────────
const getMatches = id => SESSIONS.find(s=>s.id===id)?.matches ?? [];
const getAllMatches = () => SESSIONS.flatMap(s=>s.matches);

function playerStats(matches) {
  const st = {};
  PLAYERS.forEach(p => st[p]={k:0,d:0,a:0,score:0,wins:0,losses:0,ties:0,adrSum:0,adrN:0,maps:0});
  matches.forEach(m => {
    [...m.ct,...m.t].forEach(p => {
      if(!st[p.name]) return;
      const s=st[p.name];
      s.k+=p.k; s.d+=p.d; s.a+=p.a; s.score+=p.score; s.maps++;
      if(p.adr!=null){s.adrSum+=p.adr;s.adrN++;}
      const side = m.ct.find(x=>x.name===p.name)?'CT':'T';
      if(m.winner==='TIE') s.ties++;
      else if(m.winner===side) s.wins++;
      else s.losses++;
    });
  });
  return Object.entries(st).map(([name,s])=>({
    name,...s,
    kd:s.d>0?(s.k/s.d).toFixed(2):s.k.toFixed(2),
    avgAdr:s.adrN>0?(s.adrSum/s.adrN).toFixed(1):null,
  })).sort((a,b)=>b.score-a.score);
}

function adrByMap(matches) {
  return matches.map(m => {
    const row={map:m.map,result:m.winner};
    [...m.ct,...m.t].forEach(p=>{row[p.name]=p.adr??null;});
    return row;
  });
}

// ─── SCOPE / SESSION CONTROLS ────────────────
function setScope(s) {
  scope=s;
  document.querySelectorAll('.scope-btn').forEach(b=>{
    b.classList.toggle('active', (s==='all'&&b.textContent.includes('All'))||(s==='session'&&b.textContent.includes('Session')));
  });
  document.getElementById('sess-sel').style.display = s==='session'?'block':'none';
  render();
}

function setSess(id) {
  activeSess=id;
  document.querySelectorAll('.s-chip').forEach(c=>c.classList.toggle('active',c.dataset.id===id));
  render();
}

function buildChips() {
  document.getElementById('sess-chips').innerHTML =
    SESSIONS.map(s=>`<button class="s-chip ${s.id===activeSess?'active':''}" data-id="${s.id}" onclick="setSess('${s.id}')">
      ${s.label}<span class="chip-sub">${s.matches.length} maps</span>
    </button>`).join('') +
    `<button class="s-chip" style="color:#1a2535;border-color:#111820;cursor:default;">NEXT SESSION<span class="chip-sub">TBD</span></button>`;
}

function sortLB(key) {
  lbSortKey = key;
  lbSortDir = key === 'd' ? -1 : 1;
  renderLeaderboard();
}

function renderKills() {
  const container = document.getElementById('kills-container');
  if (!container) return;
  const sorted = [...currentPs].sort((a,b) => b.k - a.k);
  const maxVal = sorted[0].k;
  container.innerHTML = sorted.map(p =>
    `<div class="bar-row">
      <div class="blbl">${p.name}</div>
      <div class="btrk"><div class="bfll" style="background:${PG[p.name]};width:${Math.round(p.k/maxVal*100)}%"></div></div>
      <div class="bnum">${p.k}</div>
    </div>`
  ).join('');
}

function renderLeaderboard() {
  const container = document.getElementById('lb-container');
  if (!container) return;
  const RC=['r1','r2','r3','r4'];

  const cols = [
    { key:'score',  label:'Score'   },
    { key:'kd',     label:'K/D'     },
    { key:'k',      label:'Kills'   },
    { key:'d',      label:'Deaths'  },
    { key:'avgAdr', label:'Avg ADR' },
    { key:'wins',   label:'Wins'    },
  ];

  const sorted = [...currentPs].sort((a,b)=>{
    const av = parseFloat(a[lbSortKey]) || 0;
    const bv = parseFloat(b[lbSortKey]) || 0;
    return (bv - av) * lbSortDir;
  });

  const arr = (key) => {
    if (lbSortKey !== key) return `<span class="arr" style="opacity:.15">${key === 'd' ? '↓' : '↑'}</span>`;
    return `<span class="arr" style="opacity:1">${key === 'd' ? '↓' : '↑'}</span>`;
  };

  let h = `<div class="col-hdr">
    <span>#</span>
    <span>Player</span>
    ${cols.map(c=>`<span class="${lbSortKey===c.key?'sort-active':''}" onclick="sortLB('${c.key}')">${c.label}${arr(c.key)}</span>`).join('')}
  </div>`;

  sorted.forEach((p,i)=>{
    const kdPct = Math.min(100,Math.round(parseFloat(p.kd)/2.5*100));
    const hl = (key) => lbSortKey === key ? `style="color:${PC[p.name]}"` : '';
    h+=`<div class="lb-row ${RC[i]}">
      <div class="rn">${i+1}</div>
      <div><div class="pname" style="color:${PC[p.name]}">${p.name}</div><div class="ptitle">${p.wins}W · ${p.losses}L · ${p.ties}T</div></div>
      <div class="sc"><div class="sv ${lbSortKey==='score'?'sort-active-val':''}" ${hl('score')}>${p.score}</div><div class="sl">Score</div></div>
      <div class="sc"><div class="sv" ${hl('kd')}>${p.kd}</div><div class="sl">K/D</div><div class="mb"><div class="mf" style="background:${PG[p.name]};width:${kdPct}%"></div></div></div>
      <div class="sc"><div class="sv" ${hl('k')}>${p.k}</div><div class="sl">Kills</div></div>
      <div class="sc"><div class="sv" ${hl('d')}>${p.d}</div><div class="sl">Deaths</div></div>
      <div class="sc"><div class="sv" ${hl('avgAdr')}>${p.avgAdr??'—'}</div><div class="sl">Avg ADR</div></div>
      <div class="sc"><div class="sv" ${hl('wins')} style="color:${lbSortKey==='wins'?PC[p.name]:'var(--win)'}">${p.wins}</div><div class="sl">Wins</div></div>
    </div>`;
  });

  container.innerHTML = h;
}

// ─── RENDER ──────────────────────────────────
function render() {
  const matches = scope==='all' ? getAllMatches() : getMatches(activeSess);
  const sessData = scope==='session' ? SESSIONS.find(s=>s.id===activeSess) : null;
  const ps = playerStats(matches);
  const adrRows = adrByMap(matches);
  const totalMaps = matches.length;
  const nSess = scope==='all' ? SESSIONS.length : 1;
  const decisiveWins = matches.filter(m=>m.winner!=='TIE').length;
  const ties = matches.filter(m=>m.winner==='TIE').length;
  const topW = [...ps].sort((a,b)=>b.wins-a.wins)[0];
  const scopeLbl = scope==='all'?'All Time':'Session';

  document.getElementById('hdr-sub').textContent = scope==='all'
    ? `4 PLAYERS · ${nSess} SESSION${nSess>1?'S':''} · ${totalMaps} MAPS`
    : `4 PLAYERS · ${sessData?.date?.toUpperCase()} · ${totalMaps} MAPS`;

  let h='';

  // ── SUMMARY ──
  h+=`<div class="sum-bar">`;
  if(scope==='all') h+=`<div class="sum-cell"><div class="sum-val" style="color:var(--accent);font-size:16px">${nSess}</div><div class="sum-lbl">Sessions</div></div>`;
  else h+=`<div class="sum-cell"><div class="sum-val" style="color:var(--accent);font-size:13px;letter-spacing:.5px">${sessData?.date}</div><div class="sum-lbl">Date</div></div>`;
  h+=`<div class="sum-cell"><div class="sum-val" style="color:#b39ddb">${totalMaps}</div><div class="sum-lbl">Maps</div></div>
      <div class="sum-cell"><div class="sum-val" style="color:var(--win)">${decisiveWins}</div><div class="sum-lbl">Decisive Wins</div></div>
      <div class="sum-cell"><div class="sum-val" style="color:var(--tie)">${ties}</div><div class="sum-lbl">Ties</div></div>
      <div class="sum-cell"><div class="sum-val" style="color:${PC[topW.name]};font-size:13px">${topW.name}</div><div class="sum-lbl">Most Wins (${topW.wins})</div></div>
  </div>`;

  // ── LEADERBOARD ──
  h+=`<div class="sec-title">⚔ Leaderboard <span class="sec-sub">${scopeLbl}</span></div>`;
  h+=`<div id="lb-container"></div>`;

  // ── KILLS ──
  h+=`<div class="sec-title" style="margin-top:38px">💀 Total Kills <span class="sec-sub">${scopeLbl}</span></div>`;
  h+=`<div class="bar-wrap" id="kills-container"></div>`;

  // ── MATCH HISTORY TIMELINE ──
  h+=`<div class="sec-title" style="margin-top:56px">📅 Match History</div><div class="tl-wrap">`;
  if(scope==='all'){
    SESSIONS.forEach((sess,si)=>{
      if(si>0) h+=`<div style="height:20px"></div>`;
      h+=sessDivider(sess);
      h+=matchTimeline(sess.matches);
    });
    h+=`<div class="future-pill"><p>Next Session · Date TBD</p></div>`;
  } else {
    const sess=SESSIONS.find(s=>s.id===activeSess);
    h+=sessDivider(sess);
    h+=matchTimeline(sess.matches);
    h+=`<div class="future-pill"><p>Next Session · Date TBD</p></div>`;
  }
  h+=`</div>`;

  // ── ADR ──
  h+=`<div class="sec-title">💥 ADR Analysis <span class="sec-sub">${scopeLbl}</span></div>`;

  // cards
  const maxAvg=Math.max(...ps.map(p=>parseFloat(p.avgAdr)||0));
  h+=`<div class="adr-cards">`;
  ps.forEach(p=>{
    const pct=p.avgAdr?Math.round(parseFloat(p.avgAdr)/maxAvg*100):0;
    const peak=adrRows.reduce((b,r)=>{ const v=r[p.name]; return v!=null&&v>(b?.v??0)?{v,map:r.map}:b; },null);
    h+=`<div class="adr-card" style="border-top:3px solid ${PC[p.name]}">
      <div class="adr-cname">${p.name}</div>
      <div class="adr-cval" style="color:${PC[p.name]}">${p.avgAdr??'—'}</div>
      <div class="adr-csub">${p.adrN} maps with data</div>
      <div class="adr-bw"><div class="adr-bf" style="background:${PG[p.name]};width:${pct}%"></div></div>
      ${peak?`<div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:#334;margin-top:5px;">Peak: ${peak.v} · ${peak.map}</div>`:''}
    </div>`;
  });
  h+=`</div>`;

  // table
  h+=`<div class="adr-tbl-wrap"><div class="adr-thdr">ADR By Map</div><div style="overflow-x:auto">
    <table class="atbl"><thead><tr><th>Map</th>${ps.map(p=>`<th style="color:${PC[p.name]}">${p.name}</th>`).join('')}<th>Result</th></tr></thead><tbody>`;
  adrRows.forEach(row=>{
    const vals=ps.map(p=>row[p.name]);
    const mx=Math.max(...vals.filter(v=>v!=null));
    const rb=row.result==='TIE'
      ?`<span style="font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:1px;color:#888;">TIE</span>`
      :`<span style="font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:1px;color:var(--win);">${row.result} WIN</span>`;
    h+=`<tr><td>${row.map}</td>`;
    ps.forEach(p=>{
      const v=row[p.name]; const best=v===mx&&v!=null;
      h+=`<td style="color:${best?PC[p.name]:'#445'};font-weight:${best?'900':'400'};font-size:${best?'14':'12'}px">${v??'—'}</td>`;
    });
    h+=`<td>${rb}</td></tr>`;
  });
  h+=`</tbody><tfoot><tr><td>Avg ADR</td>${ps.map(p=>`<td style="color:${PC[p.name]}">${p.avgAdr??'—'}</td>`).join('')}<td></td></tr></tfoot></table></div></div>`;

  // chart canvas
  h+=`<div class="adr-chart-wrap"><div class="act">ADR Trend${scope==='all'&&SESSIONS.length>1?' — All Sessions':''}</div><canvas id="adrC" style="width:100%;max-height:220px;"></canvas></div>`;

  // insights
  const swings=ps.map(p=>{
    const vals=adrRows.map(r=>r[p.name]).filter(v=>v!=null);
    const mx2=Math.max(...vals); const mn=Math.min(...vals);
    return {name:p.name,swing:vals.length>1?mx2-mn:0,peak:mx2,peakMap:adrRows.find(r=>r[p.name]===mx2)?.map};
  });
  const bigSw=[...swings].sort((a,b)=>b.swing-a.swing)[0];
  const topPk=[...swings].sort((a,b)=>b.peak-a.peak)[0];
  const winADR=computeWinADR(matches);
  const topAvgADR=[...ps].filter(p=>p.avgAdr).sort((a,b)=>parseFloat(b.avgAdr)-parseFloat(a.avgAdr))[0];
  h+=`<div class="ins-grid">
    <div class="ins-card" style="border-left:3px solid ${PC[topPk.name]}">
      <div class="ins-lbl">🔥 Highest Single-Map ADR</div>
      <div class="ins-val" style="color:${PC[topPk.name]}">${topPk.peak}</div>
      <div class="ins-desc">${topPk.name} on ${topPk.peakMap}</div>
    </div>
    <div class="ins-card" style="border-left:3px solid ${PC[bigSw.name]}">
      <div class="ins-lbl">📉 Biggest ADR Swing</div>
      <div class="ins-val" style="color:${PC[bigSw.name]}">${bigSw.swing}pts</div>
      <div class="ins-desc">${bigSw.name} — most inconsistent across maps</div>
    </div>
    <div class="ins-card" style="border-left:3px solid var(--win)">
      <div class="ins-lbl">🏆 Avg ADR in Winning Maps</div>
      <div class="ins-val" style="color:var(--win)">${winADR}</div>
      <div class="ins-desc">Team avg across decisive-win maps</div>
    </div>
    <div class="ins-card" style="border-left:3px solid var(--accent)">
      <div class="ins-lbl">📊 Top Avg ADR</div>
      <div class="ins-val" style="color:${PC[topAvgADR.name]}">${topAvgADR.avgAdr}</div>
      <div class="ins-desc">${topAvgADR.name} leads ${scopeLbl.toLowerCase()} damage output</div>
    </div>
  </div>`;

  // ── STANDOUT STATS ──
  h+=`<div class="sec-title">🏆 Standout Stats <span class="sec-sub">${scopeLbl}</span></div>`;
  h+=buildStandouts(matches,ps);

  document.getElementById('app').innerHTML=h;
  currentPs = ps;
  renderLeaderboard();
  renderKills();
  drawChart(adrRows,ps);
}

// ─── HELPERS ─────────────────────────────────
function sessDivider(sess) {
  return `<div class="sess-hdr">
    <div class="sess-pill">${sess.label}</div>
    <div class="sess-line"></div>
    <div class="sess-meta">${sess.date} · ${sess.matches.length} maps</div>
  </div>`;
}

function matchTimeline(matches) {
  return matches.map((m,i)=>{
    const isWin=m.winner!=='TIE', isLast=i===matches.length-1;
    const badge=m.winner==='TIE'
      ?`<span class="mcbadge bt">TIE</span>`
      :`<span class="mcbadge bw">${m.winner} WIN</span>`;
    return `<div class="match-row">
      <div class="tl-gut">
        <div class="tl-dot ${isWin?'win':'tie'}"></div>
        ${!isLast?'<div class="tl-ln"></div>':''}
      </div>
      <div class="mc ${isWin?'win':'tie'}">
        <div class="mch" onclick="toggleMC(this)">
          <div style="display:flex;align-items:center;gap:9px;">
            <span class="mcmap">${m.map}</span>
            <span class="mcnum">Map ${i+1}</span>
          </div>
          <span class="mcscore">${m.score}</span>
          ${badge}
          <span class="mcchev">▼</span>
        </div>
        <div class="mcbody">
          <div class="mcteam">
            <div class="tlbl ct">${m.winner==='CT'?'◆ WINNING CT SIDE':'◆ CT SIDE'}</div>
            ${m.ct.map(p=>`<div class="tplayer"><span class="tpname">${p.name}</span><span class="tpstats">${p.k}K·${p.d}D·${p.a}A·${p.score}pts${p.adr?' · ADR '+p.adr:''}</span></div>`).join('')}
          </div>
          <div class="mcteam">
            <div class="tlbl t">${m.winner==='T'?'◆ WINNING T SIDE':'◆ T SIDE'}</div>
            ${m.t.map(p=>`<div class="tplayer"><span class="tpname">${p.name}</span><span class="tpstats">${p.k}K·${p.d}D·${p.a}A·${p.score}pts${p.adr?' · ADR '+p.adr:''}</span></div>`).join('')}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleMC(hdr){ hdr.classList.toggle('open'); hdr.nextElementSibling.classList.toggle('open'); }

function computeWinADR(matches){
  const wm=matches.filter(m=>m.winner!=='TIE');
  if(!wm.length) return '—';
  let s=0,n=0;
  wm.forEach(m=>[...m.ct,...m.t].forEach(p=>{ if(p.adr!=null){s+=p.adr;n++;} }));
  return n?Math.round(s/n):'—';
}

function buildStandouts(matches,ps){
  const all=matches.flatMap(m=>[...m.ct,...m.t]);
  const topK=all.reduce((b,p)=>p.k>(b?.k??0)?p:b,null);
  const topA=all.filter(p=>p.adr!=null).reduce((b,p)=>p.adr>(b?.adr??0)?p:b,null);
  const topS=all.reduce((b,p)=>p.score>(b?.score??0)?p:b,null);
  const topAs=all.reduce((b,p)=>p.a>(b?.a??0)?p:b,null);
  const topW=[...ps].sort((a,b)=>b.wins-a.wins)[0];
  const topKD=[...ps].sort((a,b)=>parseFloat(b.kd)-parseFloat(a.kd))[0];
  const topKills=ps.reduce((b,p)=>p.k>b.k?p:b);
  const topAvgAdr=[...ps].filter(p=>p.avgAdr).sort((a,b)=>parseFloat(b.avgAdr)-parseFloat(a.avgAdr))[0];

  const mapOf=p=>{ const m=matches.find(m=>[...m.ct,...m.t].includes(p)); return m?.map??''; };

  const cards=[
    {i:'💀',v:topK?.k,    d:'Most Kills — Single Map',    p:`${topK?.name} · ${mapOf(topK)}`},
    {i:'🎯',v:topA?.adr,  d:'Highest ADR — Single Map',   p:`${topA?.name} · ${mapOf(topA)}`},
    {i:'🏅',v:topS?.score,d:'Highest Score — Single Map', p:`${topS?.name} · ${mapOf(topS)}`},
    {i:'📈',v:topKD?.kd,  d:'Best Overall K/D',            p:[...ps].sort((a,b)=>parseFloat(b.kd)-parseFloat(a.kd))[0]?.name},
    {i:'🔗',v:topAs?.a,   d:'Most Assists — Single Map',  p:topAs?.name},
    {i:'🏆',v:topW?.wins, d:'Most Wins This Period',       p:topW?.name},
    {i:'💀',v:topKills?.k,d:'Total Kills Leader',          p:topKills?.name},
    {i:'📊',v:topAvgAdr?.avgAdr,d:'Highest Avg ADR',      p:topAvgAdr?.name},
  ];
  return `<div class="stat-cards">${cards.map(c=>`<div class="stat-card"><span class="sci">${c.i}</span><div class="scv">${c.v??'—'}</div><div class="scd">${c.d}</div><div class="scp">${c.p??''}</div></div>`).join('')}</div>`;
}

function drawChart(adrRows,ps){
  requestAnimationFrame(()=>{
    const canvas=document.getElementById('adrC'); if(!canvas) return;
    const W=canvas.parentElement.clientWidth-40, H=200;
    const dpr=window.devicePixelRatio||1;
    canvas.width=W*dpr; canvas.height=H*dpr;
    canvas.style.width=W+'px'; canvas.style.height=H+'px';
    const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);

    const series=ps.map(p=>({label:p.name,color:PCSS[p.name],data:adrRows.map(r=>r[p.name])}));
    const allV=series.flatMap(s=>s.data).filter(v=>v!=null);
    if(!allV.length) return;
    const n=adrRows.length;
    const pL=50,pR=16,pT=22,pB=42;
    const minV=Math.floor(Math.min(...allV)/10)*10-5;
    const maxV=Math.ceil(Math.max(...allV)/10)*10+5;
    const sx=i=>n>1?pL+(i/(n-1))*(W-pL-pR):W/2;
    const sy=v=>pT+(1-(v-minV)/(maxV-minV))*(H-pT-pB);

    ctx.strokeStyle='#1a1f2e'; ctx.lineWidth=1;
    for(let v=Math.ceil(minV/20)*20;v<=maxV;v+=20){
      const y=sy(v);
      ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(W-pR,y);ctx.stroke();
      ctx.fillStyle='#2a3a4a';ctx.font='9px monospace';ctx.textAlign='right';ctx.fillText(v,pL-4,y+3);
    }
    adrRows.forEach((r,i)=>{
      ctx.fillStyle='#2a3a4a';ctx.font='8px monospace';ctx.textAlign='center';
      ctx.fillText(r.map.toUpperCase(),sx(i),H-pB+13);
    });

    // session dividers
    if(scope==='all'&&SESSIONS.length>1){
      let idx=0;
      SESSIONS.forEach((sess,si)=>{
        if(si>0){
          const x=sx(idx-0.5);
          ctx.strokeStyle='#1e2a3a';ctx.lineWidth=1;ctx.setLineDash([3,3]);
          ctx.beginPath();ctx.moveTo(x,pT);ctx.lineTo(x,H-pB);ctx.stroke();
          ctx.setLineDash([]);
        }
        idx+=sess.matches.length;
      });
    }

    series.forEach(s=>{
      const pts=s.data.map((v,i)=>v!=null?{x:sx(i),y:sy(v)}:null);
      const vpts=pts.filter(Boolean); if(!vpts.length) return;
      const grad=ctx.createLinearGradient(0,pT,0,H-pB);
      grad.addColorStop(0,s.color+'28');grad.addColorStop(1,s.color+'00');
      ctx.beginPath();let fi=true;
      pts.forEach(pt=>{if(!pt)return;if(fi){ctx.moveTo(pt.x,pt.y);fi=false;}else ctx.lineTo(pt.x,pt.y);});
      const lp=vpts[vpts.length-1],fp=vpts[0];
      ctx.lineTo(lp.x,H-pB);ctx.lineTo(fp.x,H-pB);ctx.closePath();
      ctx.fillStyle=grad;ctx.fill();
      ctx.beginPath();ctx.strokeStyle=s.color;ctx.lineWidth=2;ctx.lineJoin='round';
      fi=true;pts.forEach(pt=>{if(!pt)return;if(fi){ctx.moveTo(pt.x,pt.y);fi=false;}else ctx.lineTo(pt.x,pt.y);});
      ctx.stroke();
      pts.forEach((pt,i)=>{
        if(!pt) return;
        ctx.beginPath();ctx.arc(pt.x,pt.y,4,0,Math.PI*2);ctx.fillStyle=s.color;ctx.fill();
        ctx.fillStyle=s.color;ctx.font='bold 9px monospace';ctx.textAlign='center';
        ctx.fillText(s.data[i],pt.x,pt.y-8);
      });
    });

    const lw=(W-pL-pR)/series.length;
    series.forEach((s,i)=>{
      const x=pL+i*lw;
      ctx.fillStyle=s.color;ctx.fillRect(x,H-8,12,3);
      ctx.fillStyle=s.color;ctx.font='8px monospace';ctx.textAlign='left';
      ctx.fillText(s.label,x+16,H-4);
    });
  });
}

buildChips();
render();
</script>
</body>
</html>
